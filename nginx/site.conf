# Standard Laravel + Nginx config for the stream proxy.
#
# Key points:
#   - fastcgi_read_timeout 300s  → allows long-running video streams through PHP-FPM
#   - client_max_body_size 20M   → allows M3U file uploads up to 20 MB
#   - PHP sends "X-Accel-Buffering: no" for stream routes, so Nginx forwards
#     bytes to the client immediately without waiting for the full response.

server {
    listen 80;
    server_name _;

    root /var/www/streamproxy/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # ── Static files ──────────────────────────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── All requests → Laravel front controller ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass         unix:/run/php/php8.3-fpm.sock;
        fastcgi_param        SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include              fastcgi_params;

        # Must be long enough for large video files to stream through
        fastcgi_read_timeout 300s;
        send_timeout         300s;

        # PHP sets X-Accel-Buffering: no on stream responses, which tells
        # Nginx to disable buffering for that response only. No global change needed.
    }

    # ── X-Accel-Redirect stream proxy ────────────────────────────────────────
    # PHP returns X-Accel-Redirect: /proxy/<url> for stream segments.
    # Nginx fetches the origin URL internally and pipes bytes to the client.
    location /proxy/ {
        internal;

        resolver 8.8.8.8 1.1.1.1 valid=30s;

        set $target_url $uri;
        # Strip the /proxy/ prefix to get the real URL
        if ($target_url ~ "^/proxy/(.+)$") {
            set $target_url $1;
        }

        proxy_pass $target_url;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Connection "";
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control;

        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Follow redirects from origin servers
        proxy_intercept_errors on;
        error_page 301 302 303 307 308 = @follow_redirect;
        recursive_error_pages on;
    }

    location @follow_redirect {
        internal;
        resolver 8.8.8.8 1.1.1.1 valid=30s;

        set $redirect_url $upstream_http_location;
        proxy_pass $redirect_url;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Connection "";
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control;
    }

    # ── Block dotfiles ────────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
}
